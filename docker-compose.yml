version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: board-db
    environment:
      POSTGRES_DB: boarddb
      POSTGRES_USER: board
      POSTGRES_PASSWORD: board123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U board -d boarddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: board-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: boarddb
      DB_USER: board
      DB_PASSWORD: board123
      UPLOAD_PATH: /app/uploads
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: board-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
